---
- name: Create node_exporter system group
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: yes
    state: present

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    shell: /sbin/nologin
    system: yes
    create_home: no
    state: present

- name: Download node_exporter binary
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
    mode: '0644'

- name: Extract node_exporter archive
  ansible.builtin.unarchive:
    src: /tmp/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
    dest: /tmp
    remote_src: yes

- name: Install node_exporter binary
  tags: [monitoring, node_exporter, install]
  ansible.builtin.copy:
    src: /tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: Restart node_exporter

- name: Create node_exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      User={{ node_exporter_user }}
      Group={{ node_exporter_group }}
      Type=simple
      ExecStart={{ node_exporter_install_dir }}/node_exporter
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'
  notify: Restart node_exporter

- name: Check if firewalld is running
  ansible.builtin.systemd:
    name: firewalld
  register: firewalld_status
  ignore_errors: yes

- name: Open firewall port for node_exporter
  tags: [monitoring, node_exporter, firewall]
  ansible.posix.firewalld:
    port: "{{ node_exporter_port }}/tcp"
    permanent: yes
    state: enabled
    immediate: yes
  when: firewalld_status.status.ActiveState == "active"

- name: Enable and start node_exporter
  tags: [monitoring, node_exporter, service]
  ansible.builtin.systemd:
    name: node_exporter
    enabled: yes
    state: started
    daemon_reload: yes

- name: Verify node_exporter is responding
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ node_exporter_port }}/metrics"
    status_code: 200
  register: result

- name: Print verification result
  ansible.builtin.debug:
    msg: "node_exporter running on {{ inventory_hostname }} - HTTP {{ result.status }}"
# Note: Re-edit the file to add tags inline to each task
# Example tag structure for node_exporter:
# tags: [monitoring, node_exporter, metrics]
