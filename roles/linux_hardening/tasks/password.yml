---
# CIS 5.4.1 - Password policy settings

- name: CIS 5.4.1 - Ensure password creation requirements are configured
  ansible.builtin.package:
    name: libpwquality
    state: present

- name: CIS 5.4.1 - Set password minimum length
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?minlen'
    line: 'minlen = {{ password_min_length }}'

- name: CIS 5.4.1 - Set password complexity - minimum digits
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?dcredit'
    line: 'dcredit = -1'

- name: CIS 5.4.1 - Set password complexity - minimum uppercase
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?ucredit'
    line: 'ucredit = -1'

- name: CIS 5.4.1 - Set password complexity - minimum special chars
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?ocredit'
    line: 'ocredit = -1'

- name: CIS 5.4.1 - Set password complexity - minimum lowercase
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^#?lcredit'
    line: 'lcredit = -1'

- name: Set password maximum days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: 'PASS_MAX_DAYS {{ password_max_days }}'

- name: Set password minimum days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: 'PASS_MIN_DAYS {{ password_min_days }}'

- name: Set password warning days
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: 'PASS_WARN_AGE {{ password_warn_days }}'

- name: CIS 5.6 - Restrict su to wheel group
  ansible.builtin.lineinfile:
    path: /etc/pam.d/su
    regexp: '^#auth\s+required\s+pam_wheel'
    line: 'auth required pam_wheel.so use_uid'
